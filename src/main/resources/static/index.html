<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealer - Inventory</title>
    <link rel="stylesheet" href="/pagestyle.css">
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Inventory Manager</h2>
        <a href="editor.html" class="btn btn-primary">Add New Car +</a>
    </div>

    <div id="listings-container" class="card">
        <h3>Current Inventory</h3>
        <p>Click on cars for more details</p>
        <div id="listings-list">
            <p>Loading listings...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'api/v1/cars';
    const listContainer = document.getElementById('listings-list');

    async function fetchListings() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            renderListings(data);
        } catch (err) {
            listContainer.innerHTML = '<p style="color:red">Error loading listings.</p>';
        }
    }

    function renderListings(listings) {
        if (listings.length === 0) {
            listContainer.innerHTML = '<p>No listings found.</p>';
            return;
        }
        listContainer.innerHTML = listings.map(item => `
            <div class="listing-item">
                <div class="listing-info">
                    <details>
                        <summary style="display: block; cursor: pointer; margin-bottom: 10px;">
                            <h3>${item.model} - ${item.status.replaceAll(/_/g, ' ')}</h3>
                            <p>${item.price} SEK — ${item.mileage} km</p>
                        </summary>
                        <p style="white-space: pre-wrap">${item.description}</p>
                    </details>
                </div>
                <div>
                    <a href="editor.html?id=${item.id}" class="btn btn-primary">Edit</a>
                    <button class="btn btn-danger" onclick="deleteListing('${item.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function deleteListing(id) {
        if (!confirm('Are you sure?')) return;
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchListings();
        } catch (err) {
            console.error('Delete failed', err);
        }
    }

    fetchListings();
</script>
</body>
</html>
