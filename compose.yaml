services:
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3306:3306'
    volumes:
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    - mysql_data:/var/lib/mysql

volumes:
  mysql_data: